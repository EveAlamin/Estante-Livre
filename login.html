<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar - Estante Livre</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="logo">
    <img src="img/logo.svg" alt="Logotipo Estante Livre" class="logo-icone">
    <span>Estante Livre</span>
  </div>
  <nav class="main-nav">
    <ul>
      <li><a href="index.html">Início</a></li>
      <li><a href="cadastro.html">Cadastrar</a></li>
      <li><a href="login.html">Entrar</a></li>
    </ul>
  </nav>
</header>

<main>

  <section class="form-container">
    <h1>Entrar</h1>

    <form action="#">
      <div class="campo-formulario">
        <label for="email-login">E-mail</label>
        <input type="email" id="email-login" name="email">
      </div>

      <div class="campo-formulario">
        <label for="senha-login">Senha</label>
        <input type="password" id="senha-login" name="senha">
      </div>

      <button type="submit" class="btn">Entrar</button>
    </form>

    <p>Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
  </section>

</main>

<footer class="site-footer">
  <p>Estante Livre - Portal de compra e venda de livros</p>
</footer>

</body>
</html>
